# Default values for ..
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/thejefflarson/whisperer
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion. Leave empty
  # to pull the exact, cosign-signed version this chart was published for; a
  # floating tag like "latest" would defeat that signature/digest pinning.
  tag: ""
  # Pin by digest (e.g. sha256:abc123...) to guarantee a specific immutable
  # image layer regardless of tag mutability. When set, overrides tag.
  digest: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# RBAC: the operator needs cluster-wide access to Secrets and Namespaces, plus a
# Lease in its own namespace for leader election. Disable only if you manage RBAC
# out of band.
rbac:
  create: true

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Do not auto-mount the SA token cluster-wide; the deployment template
  # projects an expiring token explicitly so the mount is intentional and
  # auditable. Set to true only if you manage the volume mount yourself.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# Hardened by default: this pod holds a token that can read and write Secrets
# cluster-wide, so it runs as an unprivileged, non-root user with a read-only
# root filesystem and no Linux capabilities to shrink the blast radius of any
# compromise. Requires the image to be runnable as a non-root UID.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# Resource limits prevent adversarial reconcile loops or large secret copies
# from exhausting node resources. Tune for your cluster; these defaults are
# conservative and safe for most single-instance deployments.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /ruok
    port: http
readinessProbe:
  httpGet:
    path: /ruok
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# OTLP collector endpoint. The default targets a sidecar on localhost.
# When overriding to a remote collector, use an https:// endpoint so that
# reconciled secret names are not transmitted in plaintext.
otelEndpoint: http://localhost:4318

# NetworkPolicy restricts ingress (health-check probes only) and egress
# (Kubernetes API server, DNS, OTLP collector) for the operator pod.
# Enable this when your cluster has a CNI that enforces NetworkPolicy.
networkPolicy:
  enabled: false
