name: Dependabot auto-merge
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Gate on the VERIFIED PR author, not github.actor: under pull_request_target,
    # github.actor is whoever last triggered an event on the PR (spoofable by a
    # third party re-triggering Dependabot), whereas pull_request.user.login is the
    # PR's actual author. This job runs in the trusted base-repo context with a
    # write token, so the distinction matters.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      # `gh pr merge --auto` only completes once the branch's required status
      # checks pass, so the `rust` / `cargo audit` job must be marked required in
      # branch protection for this to act as a real CI gate. We restrict auto
      # handling to patch and minor bumps; majors require a human.
      - name: Approve and enable auto-merge
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
